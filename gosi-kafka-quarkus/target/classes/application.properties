# Quarkus HTTP Port Configuration
quarkus.http.port=8080

# ── Global Kafka Client Settings ──
kafka.bootstrap.servers=rb.apps.appsqaocp.gosi.ins:443
kafka.security.protocol=SASL_SSL
kafka.sasl.mechanism=OAUTHBEARER
kafka.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler
kafka.sasl.oauthbearer.token.endpoint.url=https://identitydev.gosi.gov.sa/am/oauth2/realms/root/realms/wiam/access_token
kafka.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId="confluent" clientSecret="GOSIwiam@2025" scope="write";

# TLS Configuration
# Place the truststore.jks in the project root or provide an absolute path here
kafka.ssl.truststore.location=truststore.jks
kafka.ssl.truststore.password=mystorepassword
kafka.ssl.truststore.type=JKS

# ── Global Schema Registry Settings ──
# Update this URL to GOSI's external Schema Registry Route endpoint
mp.messaging.connector.smallrye-kafka.schema.registry.url=https://schema-registry.apps.openshift.gosi.gov.sa

# ── Outgoing Channel (Producer) ──
mp.messaging.outgoing.payments-out.connector=smallrye-kafka
mp.messaging.outgoing.payments-out.topic=payments.demo-topic.v1
mp.messaging.outgoing.payments-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
# Using Confluent Avro Serializer
mp.messaging.outgoing.payments-out.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.payments-out.acks=all

# ── Incoming Channel (Consumer) ──
mp.messaging.incoming.payments-in.connector=smallrye-kafka
mp.messaging.incoming.payments-in.topic=payments.demo-topic.v1
mp.messaging.incoming.payments-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Using Confluent Avro Deserializer
mp.messaging.incoming.payments-in.value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
mp.messaging.incoming.payments-in.group.id=kafka-demo-consumer-group
mp.messaging.incoming.payments-in.auto.offset.reset=earliest
# Enable Specific Avro Reader (maps payload directly to com.gosi.kafka.avro.PaymentRecord class)
mp.messaging.incoming.payments-in.specific.avro.reader=true
