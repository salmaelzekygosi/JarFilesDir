# Spring HTTP Port
server.port=8081

# ── Global Spring Kafka Connection Properties ──
spring.kafka.bootstrap-servers=rb.apps.appsqaocp.gosi.ins:443
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=OAUTHBEARER
spring.kafka.properties.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler
spring.kafka.properties.sasl.oauthbearer.token.endpoint.url=https://identitydev.gosi.gov.sa/am/oauth2/realms/root/realms/wiam/access_token
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId="confluent" clientSecret="GOSIwiam@2025" scope="write";

# TLS Configuration
# Place the truststore.jks in the project root or provide an absolute path here
spring.kafka.properties.ssl.truststore.location=truststore.jks
spring.kafka.properties.ssl.truststore.password=mystorepassword
spring.kafka.properties.ssl.truststore.type=JKS

# ── Producer Settings ──
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all

# ── Consumer Settings ──
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=kafka-demo-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest

# Note on Avro Schema Registry:
# To migrate to Avro serialization once the GOSI Schema Registry route is active, uncomment the following and update SerDes:
spring.kafka.properties.schema.registry.url=https://schema-registry.apps.appsqaocp.gosi.ins
spring.kafka.properties.schema.registry.ssl.truststore.location=truststore.jks
spring.kafka.properties.schema.registry.ssl.truststore.password=mystorepassword
spring.kafka.properties.schema.registry.ssl.truststore.type=JKS
 
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.specific.avro.reader=true
