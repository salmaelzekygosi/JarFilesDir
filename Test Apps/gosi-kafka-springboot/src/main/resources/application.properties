# Spring HTTP Port
server.port=8081

# ── Global GOSI Kafka Connection Properties ──
gosi.kafka.bootstrap-servers=rb.apps.appsqaocp.gosi.ins:443
gosi.kafka.security-protocol=SASL_SSL
gosi.kafka.sasl-mechanism=OAUTHBEARER
gosi.kafka.oauth-token-url=https://identitydev.gosi.gov.sa/am/oauth2/realms/root/realms/wiam/access_token
gosi.kafka.username=confluent
gosi.kafka.password=GOSIwiam@2025

# Schema Registry Basic Auth
gosi.kafka.properties.basic.auth.credentials.source=USER_INFO
gosi.kafka.properties.basic.auth.user.info=confluent:GOSIwiam@2025

# TLS Configuration
gosi.kafka.truststore-location=truststore.jks
gosi.kafka.truststore-password=mystorepassword

app.kafka.topic=<your-namespace>.<your-topic-name>.<v(n)>

# Schema Registry
gosi.kafka.schema-registry-url=https://schema-registry.apps.appsqaocp.gosi.ins

# If you still want Spring's consumer container to use these properties for @KafkaListener
spring.kafka.bootstrap-servers=${gosi.kafka.bootstrap-servers}
spring.kafka.properties.security.protocol=${gosi.kafka.security-protocol}
spring.kafka.properties.sasl.mechanism=${gosi.kafka.sasl-mechanism}
spring.kafka.properties.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler
spring.kafka.properties.sasl.oauthbearer.token.endpoint.url=${gosi.kafka.oauth-token-url}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId="${gosi.kafka.username}" clientSecret="${gosi.kafka.password}" scope="write";

spring.kafka.properties.ssl.truststore.location=${gosi.kafka.truststore-location}
spring.kafka.properties.ssl.truststore.password=${gosi.kafka.truststore-password}
spring.kafka.properties.ssl.truststore.type=JKS

spring.kafka.consumer.group-id=<your-consumer-group-id>
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.specific.avro.reader=true
spring.kafka.properties.schema.registry.url=${gosi.kafka.schema-registry-url}
spring.kafka.properties.basic.auth.credentials.source=USER_INFO
spring.kafka.properties.basic.auth.user.info=confluent:GOSIwiam@2025

# ── SDK Logging & Interceptor Configuration ──
spring.kafka.consumer.properties.interceptor.classes=com.gosi.kafka.sdk.spring.GosiKafkaSpringConsumerInterceptor

# Console Log Pattern with Trace ID
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [TraceID: %X{trace_id}] - %msg%n
