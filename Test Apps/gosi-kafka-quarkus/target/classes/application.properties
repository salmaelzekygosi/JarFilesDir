# Quarkus HTTP Port Configuration
quarkus.http.port=8080

# ── Global GOSI Kafka Connection Properties ──
gosi.kafka.bootstrap-servers=rb.apps.appsqaocp.gosi.ins:443
gosi.kafka.security-protocol=SASL_SSL
gosi.kafka.sasl-mechanism=OAUTHBEARER
gosi.kafka.oauth-token-url=https://identitydev.gosi.gov.sa/am/oauth2/realms/root/realms/wiam/access_token
gosi.kafka.username=confluent
gosi.kafka.password=GOSIwiam@2025

# TLS Configuration
gosi.kafka.truststore-location=truststore.jks
gosi.kafka.truststore-password=mystorepassword

# Schema Registry Configuration
gosi.kafka.schema-registry-url=https://schema-registry.apps.appsqaocp.gosi.ins

app.kafka.topic=payments.demo-topic.v1

# ── Outgoing Channel (Producer) ──
mp.messaging.outgoing.payments-out.connector=smallrye-kafka
mp.messaging.outgoing.payments-out.topic=${app.kafka.topic}
# Deserializers, interceptors, and auth are now automatically injected by GosiKafkaConfigSourceInterceptor
mp.messaging.outgoing.payments-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.payments-out.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

# ── Incoming Channel (Consumer) ──
mp.messaging.incoming.payments-in.connector=smallrye-kafka
mp.messaging.incoming.payments-in.topic=${app.kafka.topic}
mp.messaging.incoming.payments-in.group.id=payment-consumer-group
# Deserializers, interceptors, and auth are now automatically injected by GosiKafkaConfigSourceInterceptor
mp.messaging.incoming.payments-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payments-in.value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
mp.messaging.incoming.payments-in.specific.avro.reader=true

# Console Log Pattern with Trace ID
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.3}] (thread-%t) [TraceID: %X{trace-id}] %s%e%n
